version: '3.8'

services:
  android-emulator:
    image: budtmo/docker-android:emulator_11.0
    privileged: true
    ports:
      - "6080:6080"   # Web UI for the emulator
      - "5554:5554"   # Android console
      - "5555:5555"   # ADB connection
    environment:
      - DEVICE=Samsung Galaxy S10
      - APPIUM=false  # Set to true if you plan to use Appium for E2E testing
      - AUTO_RECORD=false
    volumes:
      - ./acorde-app:/app
