name: Build and Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin' # Recommended Eclipse Temurin distribution
          java-version: '21'      # Sets JAVA_HOME to Java 21
          cache: 'gradle'         # Automatically caches Gradle dependencies
          cache-dependency-path: |
            src/android/build.gradle.kts
            src/android/gradle/wrapper/gradle-wrapper.properties

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          cd src
          flutter pub get

      - name: Build Android APK
        run: |
          cd src
          flutter build apk --release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: src/build/app/outputs/flutter-apk/app-release.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
