name: Build and Deploy

on:
  push:
    branches:
      - main # Change this to your main branch name if it's different

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: web_landing
          branch: gh-pages
          clean: true
